<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="logo.jpg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stavební deník – Přihlášení</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: radial-gradient(ellipse at top, #dcfce7 0%, #f5fdf5 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-wrap {
      width: 100%;
      max-width: 680px;
    }

    .logo-bar {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-logo {
      height: 180px;
      width: auto;
      display: block;
      margin: 0 auto 14px;
      padding: 2px;
    }

    .logo-bar h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .logo-bar p {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 4px;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      text-align: center;
    }

    .user-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .user-btn {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 18px 12px;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: all 0.2s ease;
    }

    .user-btn:hover {
      border-color: var(--primary);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(60,184,67,0.15);
    }

    .u-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
    }

    .user-btn.admin .u-avatar {
      background: #1e6b24;
    }

    .u-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .u-role {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .user-btn.admin .u-role {
      color: var(--primary-dark);
      font-weight: 600;
    }

    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.72rem;
      margin: 4px 0 16px;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      position: relative;
      background: transparent;
      padding: 0 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .version {
      text-align: center;
      margin-top: 20px;
      font-size: 0.7rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="logo-bar">
    <img src="logo.jpg" class="login-logo" alt="I. Kamenická stavební a obchodní firma s.r.o." />
    <h1>Stavební deník</h1>
    <p>I. Kamenická stavební a obchodní firma s.r.o. · vyhl. č. 499/2006 Sb.</p>
  </div>

  <div class="section-label">Vedení</div>
  <div class="user-grid" id="grid-admin"></div>

  <div class="divider"><span>stavbyvedoucí</span></div>

  <div class="user-grid" id="grid-users"></div>

  <div class="version">Stavební deník v3.0</div>
</div>

<script>
  const USERS = [
    { name: 'Ing. Lukáš Hrbek',   role: 'admin', title: 'Vedoucí pobočky'  },
    { name: 'Jaroslav Dvořáček',  role: 'admin', title: 'Vedoucí / Admin'   },
    { name: 'Tadeáš Zahradník',   role: 'admin', title: 'Vedoucí / Admin'   },
    { name: 'Václav Hanzálek',    role: 'admin', title: 'Vedoucí / Admin'   },
    { name: 'Jan Sláma',          role: 'user',  title: 'Stavbyvedoucí'     },
    { name: 'Roman Fára',         role: 'user',  title: 'Stavbyvedoucí'     },
    { name: 'Antonín Houser',     role: 'user',  title: 'Stavbyvedoucí'     },
  ];

  function initials(name) {
    return name.replace(/Ing\.\s*/, '').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
  }

  function buildGrid() {
    const admins = USERS.filter(u => u.role === 'admin');
    const users  = USERS.filter(u => u.role === 'user');

    document.getElementById('grid-admin').innerHTML = admins.map(u => `
      <button class="user-btn admin" onclick="login('${u.name}', '${u.role}')">
        <div class="u-avatar">${initials(u.name)}</div>
        <div class="u-name">${u.name}</div>
        <div class="u-role">${u.title}</div>
      </button>`).join('');

    document.getElementById('grid-users').innerHTML = users.map(u => `
      <button class="user-btn" onclick="login('${u.name}', '${u.role}')">
        <div class="u-avatar">${initials(u.name)}</div>
        <div class="u-name">${u.name}</div>
        <div class="u-role">${u.title}</div>
      </button>`).join('');
  }

  function login(name, role) {
    const user = USERS.find(u => u.name === name);
    localStorage.setItem('sd_user', JSON.stringify(user));
    window.location = role === 'admin' ? 'dashboard-nadrizeny.html' : 'dashboard.html';
  }

  buildGrid();
</script>
</body>
</html>
