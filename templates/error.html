<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ code }} — {{ title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafb; color: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .error-box { text-align: center; padding: 48px 40px; max-width: 440px; }
    .error-code { font-size: 5rem; font-weight: 800; color: #e5e7eb; line-height: 1; margin-bottom: 8px; letter-spacing: -0.04em; }
    .error-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 8px; }
    .error-msg { font-size: 0.92rem; color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
    .error-btn { display: inline-block; padding: 10px 24px; background: #2e8b2e; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.88rem; transition: background 0.15s; }
    .error-btn:hover { background: #246b24; }
  </style>
</head>
<body>
  <div class="error-box">
    <div class="error-code">{{ code }}</div>
    <div class="error-title">{{ title }}</div>
    <div class="error-msg">{{ message }}</div>
    <a href="/" class="error-btn">Zpět na hlavní stránku</a>
  </div>
</body>
</html>
