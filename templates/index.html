<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="{{ url_for('static', filename='logo.jpg') }}" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stavební deník – {{ firma.nazev }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <style>
    body {
      background: linear-gradient(170deg, #133d18 0%, #1e6b24 35%, #2d8a36 65%, #163d1a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(60,184,67,0.12) 0%, transparent 65%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 200px;
      background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
      pointer-events: none;
    }

    .hero {
      text-align: center;
      margin-bottom: 36px;
      position: relative;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(60,184,67,0.2);
      border: 2px solid rgba(60,184,67,0.4);
      margin-bottom: 20px;
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
    }

    {% if firma.logo_url %}
    .logo-wrap { background: none; border: none; }
    .logo-wrap img {
      height: 80px;
      width: auto;
      display: block;
      border-radius: 20px;
    }
    {% endif %}

    .hero h1 {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.7rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .hero p {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.02em;
    }

    .profiles-wrap {
      width: 100%;
      max-width: 700px;
      position: relative;
    }

    .user-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .user-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px 10px;
      cursor: pointer;
      font-family: inherit;
      text-align: center;
      transition: all 0.22s ease;
      backdrop-filter: blur(8px);
    }

    .user-btn:hover {
      background: rgba(60,184,67,0.15);
      border-color: rgba(60,184,67,0.5);
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.3), 0 0 20px rgba(60,184,67,0.15);
    }

    .u-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(60,184,67,0.25);
      border: 2px solid rgba(60,184,67,0.5);
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
    }

    .user-btn.admin .u-avatar {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
    }

    .u-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
    }

    .u-role {
      font-size: 0.66rem;
      color: rgba(255,255,255,0.45);
      margin-top: 3px;
    }

    .user-btn.admin .u-role {
      color: rgba(109,209,116,0.85);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 4px 0 14px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .divider span {
      font-size: 0.62rem;
      font-weight: 600;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .version {
      margin-top: 28px;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.04em;
    }

    .back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      font-size: 0.82rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(255,255,255,0.7); }

    .error-msg {
      background: rgba(229,62,62,0.2);
      border: 1px solid rgba(229,62,62,0.4);
      color: #fff;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 0.82rem;
      margin-bottom: 16px;
      text-align: center;
      display: none;
    }

    .error-msg.show { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero           { animation: fadeUp 0.55s ease both; }
    .profiles-wrap  { animation: fadeUp 0.55s 0.15s ease both; }
    .version        { animation: fadeUp 0.4s 0.3s ease both; }
    .user-btn       { animation: fadeUp 0.4s ease both; }
  </style>
</head>
<body>

<a href="/" class="back-link">&larr; Zpět na výběr firmy</a>

<div class="hero">
  <div class="logo-wrap">
    {% if firma.logo_url %}
    <img src="{{ firma.logo_url }}" alt="{{ firma.nazev }}" />
    {% else %}
    {{ firma.nazev[:2]|upper }}
    {% endif %}
  </div>
  <h1>Stavební deník</h1>
  <p>{{ firma.nazev }}</p>
</div>

<div class="profiles-wrap">
  <div id="error-msg" class="error-msg"></div>

  <div class="divider"><span>vedení</span></div>
  <div class="user-grid" id="grid-admin">
    <div style="color:rgba(255,255,255,0.3);font-size:0.82rem;padding:12px;">Načítám…</div>
  </div>

  <div class="divider"><span>stavbyvedoucí</span></div>
  <div class="user-grid" id="grid-users">
    <div style="color:rgba(255,255,255,0.3);font-size:0.82rem;padding:12px;">Načítám…</div>
  </div>

  {% if has_password %}
  <div class="divider"><span>přístup chráněn heslem</span></div>
  <div style="display:flex;gap:8px;max-width:320px;margin:0 auto;">
    <input id="firma-heslo" type="password" placeholder="Heslo firmy…"
           style="flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:10px;padding:12px 14px;color:#fff;font-size:0.88rem;font-family:inherit;outline:none;" />
  </div>
  {% endif %}
</div>

<div class="version">Stavební deník · {{ firma.nazev }}</div>

<script>
  const FIRMA = '{{ firma_slug }}';
  const HAS_PASSWORD = {{ 'true' if has_password else 'false' }};

  function initials(name) {
    return name.replace(/Ing\.\s*/, '').replace(/Bc\.\s*/, '').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  async function loadUsers() {
    try {
      const res = await fetch(`/${FIRMA}/api/uzivatele`);
      if (res.status === 403 || res.status === 401) {
        // Not logged in yet — load users from template-injected data
        buildFromTemplate();
        return;
      }
      const users = await res.json();
      buildGrid(users);
    } catch(e) {
      buildFromTemplate();
    }
  }

  function buildFromTemplate() {
    // Fallback: use server-rendered user list
    const users = [
      {% for u in uzivatele %}
      { name: '{{ u.jmeno }}', role: '{{ u.role }}', title: '{{ u.title or "" }}' },
      {% endfor %}
    ];
    buildGrid(users);
  }

  function buildGrid(users) {
    const admins = users.filter(u => u.role === 'admin');
    const workers = users.filter(u => u.role === 'user');

    document.getElementById('grid-admin').innerHTML = admins.length ? admins.map((u, i) => `
      <button class="user-btn admin" onclick="login('${esc(u.jmeno || u.name)}')" style="animation-delay:${0.2 + i * 0.06}s">
        <div class="u-avatar">${initials(u.jmeno || u.name)}</div>
        <div class="u-name">${esc(u.jmeno || u.name)}</div>
        <div class="u-role">${esc(u.title || 'Vedení')}</div>
      </button>`).join('') : '<div style="color:rgba(255,255,255,0.3);font-size:0.82rem;padding:12px;">Žádní administrátoři</div>';

    document.getElementById('grid-users').innerHTML = workers.length ? workers.map((u, i) => `
      <button class="user-btn" onclick="login('${esc(u.jmeno || u.name)}')" style="animation-delay:${0.35 + i * 0.06}s">
        <div class="u-avatar">${initials(u.jmeno || u.name)}</div>
        <div class="u-name">${esc(u.jmeno || u.name)}</div>
        <div class="u-role">${esc(u.title || 'Stavbyvedoucí')}</div>
      </button>`).join('') : '<div style="color:rgba(255,255,255,0.3);font-size:0.82rem;padding:12px;">Žádní stavbyvedoucí</div>';
  }

  async function login(name) {
    const payload = { jmeno: name };
    if (HAS_PASSWORD) {
      const hesloEl = document.getElementById('firma-heslo');
      const heslo = (hesloEl ? hesloEl.value : '').trim();
      if (!heslo) { showError('Zadejte heslo firmy'); if (hesloEl) hesloEl.focus(); return; }
      payload.heslo = heslo;
    }
    try {
      const res = await fetch(`/${FIRMA}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (res.ok && data.ok) {
        window.location = data.redirect;
      } else {
        showError(data.error || 'Přihlášení se nezdařilo');
      }
    } catch (e) {
      showError('Chyba připojení k serveru');
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  buildFromTemplate();
</script>
</body>
</html>
